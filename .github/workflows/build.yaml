name: Lint Server

on:
  workflow_call:
    inputs:
      image_tag:
        type: string
        default: 'latest'
      deploy:
        type: boolean
        default: false

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  Builder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node Env
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Packages
        working-directory: server
        run: npm install

      - name: Build Server
        working-directory: server
        run: npm run build

      # - name: Save Build Artifacts
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: build
      #     path: build.tar

      - name: Build Image
        working-directory: server
        env:
          API_IMAGE: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}"
        run: |
          echo "# Image Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "COMMIT: $(git rev-parse HEAD)" >> $GITHUB_STEP_SUMMARY
          echo "BRANCH: $(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_STEP_SUMMARY
          
          docker build \
            -t $API_IMAGE \
            --build-arg \"COMMIT=$(git rev-parse HEAD)\" \
            --build-arg \"BRANCH=$(git rev-parse --abbrev-ref HEAD)\"  \
            .

      - name: Upload image
        if: ${{ inputs.deploy }}
        uses: ishworkh/container-image-artifact-upload@v1.0.0
        with:
          image: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}"
          retention_days: "2"