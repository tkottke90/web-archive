name: Docker Build

on:
  pull_request:
  release:
    types: [published]
    
env:
  IMAGE_NAME: "@tkottke90/web-archive"

jobs:
  Builder:
    runs-on: ubuntu-latest
    outputs:
      img: ${{ steps.version.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        id: version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
        run: |
          if [[ $REF_TYPE == "tag" ]]; then
            VERSION=$(echo $REF | rev | cut -d '/' -f 1 | rev)
          else
            if [[ $REF == *release/* ]]; then
              VERSION=$(echo $REF | rev | cut -d '/' -f 1 | rev)-RC
            else
              VERSION=$(echo $SHA | cut -b 1-8)-DEV-SNAPSHOT
            fi
          fi

          IMAGE="${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}/${{ env.IMAGE_NAME }}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE}:${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: ./.github/actions/npm-app-docker
        with:
          image-tag: ${{ steps.version.outputs.image_tag }}
          npm-registry: ${{ vars.NPM_REGISTRY_URL }}
          npm-token: ${{ secrets.NPM_REGISTRY_TOKEN  }}
          push: ${{ github.event_name == 'release' }}
          registry-password: ${{ secrets.REGISTRY_USERNAME }}
          registry-username: ${{ secrets.REGISTRY_PASSWORD }}
          registry: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
          build-args: |
            COMMIT=${{ github.sha }}
            BRANCH=${{ github.ref }}
            VERSION=${{ steps.version.outputs.version }}
